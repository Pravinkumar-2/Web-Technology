<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Login</title><style>body{font-family:Arial,sans-serif;background-color:#f4f4f4;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;}.login-container{background:white;padding:20px;border-radius:8px;box-shadow:0 0 10px rgba(0,0,0,0.1);width:300px;}h2{text-align:center;}form{display:flex;flex-direction:column;}input{margin-bottom:10px;padding:10px;border:1px solid #ccc;border-radius:4px;}button{padding:10px;background-color:#4CAF50;color:white;border:none;border-radius:4px;cursor:pointer;}button:hover{background-color:#45a049;}.signup-link{text-align:center;margin-top:10px;}.error-message{color:red;margin-bottom:10px;display:none;padding:10px;background-color:#ffebee;border-radius:4px;border:1px solid #f5a5a5;}.success-message{color:green;margin-bottom:10px;display:none;padding:10px;background-color:#e8f5e9;border-radius:4px;border:1px solid #81c784;}</style></head><body><div class="login-container"><h2>Login</h2><div id="errorMessage" class="error-message"></div><div id="successMessage" class="success-message"></div><form id="loginForm"><input type="text" id="username" name="username" placeholder="Username" required><input type="password" id="password" name="password" placeholder="Password" required><button type="submit">Login</button></form><div class="signup-link"><a href="/signup">Dont have an account? Sign up</a></div></div><script>document.getElementById("loginForm").addEventListener("submit", async (e) => {e.preventDefault(); const username = document.getElementById("username").value; const password = document.getElementById("password").value; const errorDiv = document.getElementById("errorMessage"); const successDiv = document.getElementById("successMessage"); errorDiv.style.display = "none"; successDiv.style.display = "none"; try {const response = await fetch("/login", {method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({ username, password })}); const text = await response.text(); if (response.ok) {successDiv.textContent = "Login successful! Redirecting..."; successDiv.style.display = "block"; setTimeout(() => window.location.href = "/", 2000); } else {errorDiv.textContent = text; errorDiv.style.display = "block"; }} catch (error) {errorDiv.textContent = "Error: " + error.message; errorDiv.style.display = "block"; } });</script></body></html>
